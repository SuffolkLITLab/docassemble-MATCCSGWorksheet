---
include:
  - docassemble.AssemblyLine:assembly_line.yml
  - child_support_guidelines_worksheet_core.yml
---
metadata:
  title: |
    Massachusetts Child Support Guidelines Worksheet (CJD 304)
  short title: |
    Child Support Worksheet
  description: |
    Generates a filled-in 2025 Massachusetts Child Support Guidelines Worksheet (CJD 304)
    by collecting the inputs needed for Sections 1-8 and performing the worksheet's
    calculations (Tables A, B, and C).
  authors:
    - name: Suffolk LIT Lab AssemblyLine
      organization: Massachusetts Court System Forms Project
  revision_date: 2026-06-16
  jurisdiction: Massachusetts
  id: ma child support guidelines worksheet
---
code: |
  github_repo_name = 'docassemble-MATCCSGWorksheet'
---
code: |
  al_form_type = "other_form"
---
code: |
  AL_DEFAULT_COUNTRY = "US"
---
code: |
  AL_DEFAULT_STATE = "MA"
---
code: |
  ma_child_support_guidelines_worksheet_attachment.enabled = True
---
objects:
  - users: ALPeopleList.using(ask_number=False, target_number=2)
  - al_user_bundle: ALDocumentBundle.using(elements=[ma_child_support_guidelines_worksheet_attachment], filename="MA_Child_Support_Worksheet", title="All forms to download for your records", enabled=True)
  - al_recipient_bundle: ALDocumentBundle.using(elements=[ma_child_support_guidelines_worksheet_attachment], filename="MA_Child_Support_Worksheet", title="All forms to file", enabled=True)
---
features:
  navigation: True
  question back button: True
  progress bar: True
---
sections:
  - csg_intro: Getting started
  - csg_parties: Parents and children
  - csg_income: Income, benefits, and deductions
  - csg_childcare: Child care costs
  - csg_review: Review and download
---
initial: True
code: |
  al_nav_sections = [
    {"csg_intro": "Getting started"},
    {"csg_parties": "Parents and children"},
    {"csg_income": "Income and deductions"},
    {"csg_childcare": "Child care"},
    {"csg_review": "Review and download"},
  ]
---
mandatory: True
comment: |
  Standalone interview flow.
code: |
  al_intro_screen
  ma_child_support_guidelines_worksheet_intro
  interview_order_ma_child_support_guidelines_worksheet
  store_variables_snapshot(
      persistent=True,
      data={
          "zip": showifdef("users[0].address.zip"),
          "reached_interview_end": True,
      },
  )
  ma_child_support_guidelines_worksheet_download
---
id: parents names
section: csg_parties
question: |
  What are the parents' names?
fields:
  - First parent's full name: users[0].name.first
  - Second parent's full name: users[1].name.first
note: |
  % if parenting_arrangement_primary:
  Since the children live mainly with one parent, that parent should be first.
  % endif
